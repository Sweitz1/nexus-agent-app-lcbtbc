name: Build Bootloader Unlock APK

on:
  push:
    branches: [claude/android-bootloader-unlock-usb-d25oa3, prod]
    paths:
      - 'android-bootloader-unlock/**'
      - '.github/workflows/build-bootloader-unlock-apk.yml'
  pull_request:
    paths:
      - 'android-bootloader-unlock/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ubuntu-latest runners ship with $ANDROID_HOME pre-set and sdkmanager
      # available. We just need to install the specific platform/build-tools.
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install SDK Platform 35 and Build Tools 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" --no_https

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('android-bootloader-unlock/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-bootloader-unlock/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android-bootloader-unlock/gradlew

      - name: Build debug APK
        working-directory: android-bootloader-unlock
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-bootloader-unlock-debug
          path: android-bootloader-unlock/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
