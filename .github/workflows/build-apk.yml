name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (e.g. https://your-backend.com)'
        required: false
        default: 'http://10.0.2.2:3000'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web bundle
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Copy web assets into Android project
        run: |
          mkdir -p android-webview/app/src/main/assets
          cp -r dist/. android-webview/app/src/main/assets/

      - name: Generate app icons
        run: |
          for size in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            dir=$(echo $size | cut -d: -f1)
            px=$(echo $size | cut -d: -f2)
            mkdir -p android-webview/app/src/main/res/mipmap-$dir
            convert assets/icon.png -resize ${px}x${px} android-webview/app/src/main/res/mipmap-$dir/ic_launcher.png
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        working-directory: android-webview
        run: gradle wrapper

      - name: Build debug APK
        working-directory: android-webview
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-agent-debug
          path: android-webview/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
