name: Build Windows MSI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron build tools (isolated)
        run: |
          mkdir electron-build
          cd electron-build
          npm init -y
          npm install electron electron-builder png-to-ico --save-dev --legacy-peer-deps

      - name: Convert PNG icon to ICO
        run: |
          node -e "
          const pngToIco = require('./electron-build/node_modules/png-to-ico');
          const fs = require('fs');
          pngToIco('assets/icon.png').then(buf => {
            fs.writeFileSync('assets/icon.ico', buf);
            console.log('icon.ico created, size=' + buf.length);
          }).catch(e => { console.error(e); process.exit(1); });
          "

      - name: Build Windows MSI
        run: node electron-build/node_modules/.bin/electron-builder --win msi --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-agent-windows-msi
          path: dist-electron/*.msi
          retention-days: 30
